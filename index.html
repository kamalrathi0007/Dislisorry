<!DOCTYPE html>
<html>
<head>
  <title>I’m Sorry ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 38px;
      margin-bottom: 15px;
    }

    #message {
      font-size: 18px;
      width: 85%;
      max-width: 500px;
      margin-bottom: 20px;
      min-height: 60px;
    }

    img {
      width: 220px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .buttons {
      position: relative;
      width: 300px;
      height: 150px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      position: absolute;
      transition: 0.2s;
    }

    #yes {
      background: #4CAF50;
      color: white;
      left: 30px;
      top: 50px;
    }

    #yes:hover {
      transform: scale(1.2);
    }

    #no {
      background: #f44336;
      color: white;
      left: 150px;
      top: 50px;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<h1>I'm really sorry disliii 😔❤️</h1>

<div id="message"></div>

<img src="IMG-20260604-WA0007.jpg">

<div class="buttons">
  <button id="yes" onclick="forgive()">Forgive me ❤️</button>
  <button id="no">Still angry 😅</button>
</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* Typing Effect */
let text = "I know I mess up soo , but tu toh meri cutiepie hena , me toh overthinking me kuch bhi bol deta hu par tu meri smajhdarr si hena , mera toh bechara chota sa ghutne me dimag he aap toh kitni smart ho or sundar bhi ho , bura na mano naa u baat ka mera kon he mera apke siwa 🩷.";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}
typing();

/* Yes Button */
function forgive() {
  document.body.innerHTML = `
    <h1>HEHE thankkkk you love you yrr ❤️</h1>
    <p>I promise I’ll do better... forever 🥺</p>
    <h2>bura manne ka hakk he apko but utna hakk hamara bhi he mannen ka 😭💖</h2>
  `;
}

/* Smooth No Button Movement (NO LAG) */
const noBtn = document.getElementById("no");

noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("mouseover", moveButton);

function moveButton() {
  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;

  const randomX = Math.random() * maxX;
  const randomY = Math.random() * maxY;

  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
}

/* Floating Hearts */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);

</script>

</body>
</html>

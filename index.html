   <!DOCTYPE html>
<html>
<head>
  <title>I’m Sorry disliii ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    #message {
      font-size: 20px;
      width: 90%;
      max-width: 600px;
      margin-bottom: 20px;
      line-height: 1.5;
      min-height: 80px;
    }

    img {
      width: 80%;
      max-width: 320px;
      height: auto;
      border-radius: 20px;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .buttons {
      position: relative;
      width: 100%;
      height: 150px;
    }

    button {
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      position: absolute;
      transition: 0.2s;
    }

    #yes {
      background: #4CAF50;
      left: 25%;
      top: 40px;
    }

    #yes:hover {
      transform: scale(1.2);
    }

    #no {
      background: #f44336;
      left: 55%;
      top: 40px;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<h1>I'm really sorry meri misri 😔❤️</h1>

<div id="message"></div>

<img src="IMG-20260604-WA0007.jpg">

<div class="buttons">
  <button id="yes" onclick="forgive()">Forgive me ❤️</button>
  <button id="no">Still angry 😅</button>
</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* Typing Effect */
let text = "I know I mess up soo , but tu toh meri cutiepie hena , me toh overthinking me kuch bhi bol deta hu par tu meri smajhdarr si hena , mera toh bechara chota sa ghutne me dimag he aap toh kitni smart ho or sundar bhi ho , bura na mano naa u baat ka mera kon he mera apke siwa 🩷.";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 35);
  }
}
typing();

/* YES BUTTON */
function forgive() {
  document.body.innerHTML = `
    <h1 style="font-size:40px;">HEHE thankkkk you love you yrr ❤️</h1>
    <p style="font-size:22px;">I promise I’ll do better... forever 🥺</p>
    <h2 style="font-size:24px;">bura manne ka hakk he apko but utna hakk hamara bhi he mannen ka 😭💖</h2>
  `;
}

/* NO BUTTON (ALWAYS STAYS INSIDE SCREEN) */
const noBtn = document.getElementById("no");

function moveButton() {
  const padding = 20;

  const maxX = window.innerWidth - noBtn.offsetWidth - padding;
  const maxY = window.innerHeight - noBtn.offsetHeight - padding;

  const randomX = Math.max(padding, Math.random() * maxX);
  const randomY = Math.max(padding, Math.random() * maxY);

  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

/* FLOATING HEARTS */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 25 + 15 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 250);

</script>

</body>
</html>
